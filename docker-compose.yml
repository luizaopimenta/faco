version: '3.8'

services:
  app:
    build: .
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    networks:
      - appnet
    depends_on:
      - db

  web:
    image: nginx:stable-alpine
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: facodb
      MYSQL_USER: facodb
      MYSQL_PASSWORD: lfpYm3nta!
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - appnet

volumes:
  dbdata:

networks:
  appnet:
    driver: bridge
